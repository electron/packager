name: electron-nightly Canary

on:
  schedule:
    - cron: "15 8 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [windows-latest, macOS-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # tag: v7.0.0
        with:
          repository: electron/minimal-repro
          ref: refs/heads/main
          path: minimal-repro
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # tag: v6.4.0
        with:
          # electron/minimal-repro doesn't have a .nvmrc file
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: minimal-repro/package-lock.json
      - name: Replace electron with electron-nightly
        run: |
          cd minimal-repro
          npm uninstall --save-dev electron
          npm install --save-dev electron-nightly@latest
        shell: bash
      - name: Install Electron Packager
        run: |
          cd minimal-repro
          npm install --save-dev @electron/packager@latest
        shell: bash
      - name: Package
        env:
          MATRIX_OS: ${{ matrix.os }}
        run: |
          cd minimal-repro
          if [ "$MATRIX_OS" == "macOS-latest" ]; then
            node_modules/.bin/electron-packager . --arch=universal
          else
            node_modules/.bin/electron-packager . --arch=all
          fi
        shell: bash
